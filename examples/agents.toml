# acp-subagent-mcp 高级配置示例。
# 一般用户不需要这个文件；默认配置已经使用 claude-agent-acp 作为子代理命令。
# 注意：本 MCP 包不会自动安装任何具体 ACP adapter；请确保该命令已在 PATH，或通过环境变量覆盖。

[defaults]
default_agent = "claude"
timeout_secs = 600
inactivity_timeout_secs = 120
max_depth = 2
max_prompt_chars = 120000
max_inline_file_chars = 30000
log_dir = ".subagent-runs"
session_ttl_secs = 1800
completed_session_ttl_secs = 600
max_active_sessions = 4
acp_cancel_grace_ms = 3000
process_kill_grace_ms = 2000

[security]
# 生产环境请改为你的项目根目录或项目集合目录。
allowed_cwd_roots = ["/tmp"]
allow_network = false
max_read_file_bytes = 1048576
require_absolute_agent_command = false

[concurrency]
max_parallel_tasks = 4
default_conflict_policy = "single_writer_per_cwd"

[skills]
enabled = true
default_mode = "list" # off | list | inline
include_project_skills = true
include_user_skills = true
discovery_roots = []
default_names = []
max_skills = 20
max_description_chars = 360
max_skill_chars = 8000
max_total_skill_chars = 20000

[worktree]
enabled = false
base_dir = ".subagent-worktrees"
keep_on_failure = true
keep_on_success = false
max_patch_bytes = 2000000
include_untracked = false

[logs]
enabled = true
redact = true
retention_days = 7
max_event_bytes = 10485760
max_stderr_bytes = 1048576
save_rendered_prompt = "redacted"
file_mode = "0600"

[permissions.default]
read = "allow"
search = "allow"
edit = "deny"
execute = "deny"
network = "deny"

[permissions.claude]
read = "allow"
search = "allow"
edit = "allow"
execute = "deny"
network = "deny"

[agents.claude]
description = "默认 Claude ACP 子代理，适合代码审查、实现、调试和多轮修正。"
command = "claude-agent-acp"
args = []
capabilities = ["claude", "code", "review", "analysis", "edit", "skills"]
system_prompt = """
你是一个被父代理调用的 Claude 子代理。
严格遵守任务边界，只返回最终结果，不输出隐藏推理。
如果 prompt 中提供了父代理 Skill 清单，请优先遵守相关项目约定。
"""
install_hint = "请确认 claude-agent-acp 已在 PATH，或通过 ACP_SUBAGENT_CLAUDE_COMMAND 指定绝对路径。本 MCP 包不会自动安装具体子代理 adapter。"

[agents.claude.env]
ANTHROPIC_API_KEY = { from_env = "ANTHROPIC_API_KEY" }
ANTHROPIC_AUTH_TOKEN = { from_env = "ANTHROPIC_AUTH_TOKEN" }
ANTHROPIC_BASE_URL = { from_env = "ANTHROPIC_BASE_URL" }
ANTHROPIC_MODEL = { from_env = "ANTHROPIC_MODEL" }
CLAUDE_CONFIG_DIR = { from_env = "CLAUDE_CONFIG_DIR" }

[agents.mock]
description = "本地测试用 ACP mock agent。"
command = "node"
args = ["/absolute/path/to/acp-subagent-mcp/dist/test/fixtures/mock-acp-agent.js"]
capabilities = ["analysis", "review"]
system_prompt = "你是一个测试用子代理，只返回简短 JSON。"

[agents.codex]
description = "适合代码实现、补丁、测试和代码审查。"
command = "codex-acp"
args = []
capabilities = ["code", "review", "edit"]

[permissions.codex]
read = "allow"
search = "allow"
edit = "allow"
execute = "deny"
network = "deny"

[agents.gemini]
description = "适合大上下文分析、方案比较和第二意见。"
command = "gemini"
args = ["--acp"]
capabilities = ["analysis", "review"]

[agents.custom]
description = "自定义 ACP agent 示例。"
command = "/absolute/path/to/custom-agent"
args = ["--acp"]
capabilities = ["analysis"]

[agents.custom.env]
CUSTOM_AGENT_TOKEN = { from_env = "CUSTOM_AGENT_TOKEN" }

# 禁止主 agent 传任意 mcpServers；如需连接 MCP Server，只能引用这里的 profile。
[mcp_servers.filesystem]
enabled = false
transport = "stdio"
command = "/absolute/path/to/filesystem-mcp"
args = ["--stdio"]
allowed_agents = ["claude", "codex", "gemini"]
