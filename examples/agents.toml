[defaults]
timeout_secs = 60
inactivity_timeout_secs = 30
heartbeat_timeout_secs = 60
max_depth = 2
max_prompt_chars = 120000
max_inline_file_chars = 30000
max_tool_output_chars = 12000
default_detail_level = "summary"
log_dir = ".subagent-runs"
session_ttl_secs = 1800
completed_session_ttl_secs = 600
max_active_sessions = 8

[security]
allowed_cwd_roots = [".", "/tmp"]
allow_network = false

[concurrency]
max_parallel_tasks = 4
default_conflict_policy = "single_writer_per_cwd"

[session_pool]
enabled = true
max_pooled_sessions_per_parent = 4
max_context_usage_ratio = 0.9
idle_ttl_secs = 1800
reuse_policy = "auto"

[permissions.default]
read = "allow"
search = "allow"
edit = "deny"
execute = "deny"
network = "deny"

[permissions.fake]
read = "allow"
search = "allow"
edit = "deny"
execute = "deny"
network = "deny"

[agents.fake]
description = "本地示例 ACP agent，用于验证 MCP Server 能否跑通 initialize、session/new 和 session/prompt。"
command = "node"
args = ["examples/fake-acp-agent.mjs"]
capabilities = ["analysis", "review", "demo"]
system_prompt = """
你是一个示例子代理。你只用于本地连通性测试。
"""

